<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Ops Telemetry SDK — 示例</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
    h1 { border-bottom: 2px solid #e5e7eb; padding-bottom: 0.5rem; }
    button { margin: 4px 6px; padding: 8px 16px; cursor: pointer; border: 1px solid #d1d5db; border-radius: 6px; background: #f9fafb; font-size: 14px; }
    button:hover { background: #e5e7eb; }
    .log { background: #1e1e1e; color: #d4d4d4; padding: 1rem; border-radius: 8px; max-height: 350px; overflow-y: auto; font-family: monospace; font-size: 12px; white-space: pre-wrap; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .badge-ok { background: #dcfce7; color: #166534; }
    .badge-warn { background: #fef9c3; color: #854d0e; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    td, th { border: 1px solid #e5e7eb; padding: 6px 12px; text-align: left; font-size: 14px; }
    th { background: #f9fafb; }
  </style>
</head>
<body>
  <h1>🧪 AI Ops Telemetry SDK 示例</h1>
  <p>
    此页面演示 SDK 的 Buffer、MockTransport、采样和采集器能力。
    所有事件使用 <strong>MockTransport</strong>（不发送网络请求），发送的批次显示在下方。
  </p>

  <h2>操作</h2>
  <button id="btnFlush">手动 Flush</button>
  <button id="btnShow">显示已发送批次</button>
  <button id="btnReset">清空日志</button>
  <button id="btnTest">运行集成测试</button>

  <h2>已发送批次</h2>
  <div id="batchLog" class="log">等待事件…</div>

  <h2>集成测试结果</h2>
  <div id="testResults"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
